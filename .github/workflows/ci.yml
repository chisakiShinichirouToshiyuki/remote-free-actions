name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: lint · backend typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # free-actions-core is a git dependency whose prepare build uses bun.
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.10'

      - run: npm ci

      - name: Lint (eslint, 0 warnings)
        run: npm run lint

      - name: Typecheck Amplify backend
        run: npm run typecheck:backend
# NOTE: the frontend `vite build` needs the deploy-generated amplify_outputs.json,
# so it runs on Amplify Hosting (ampx pipeline-deploy), not in this CI.
